<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>रिपोर्ट - व्यापार समाधान</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; color: #1e293b; padding: 15px; padding-bottom: 30px; }
        .header { background: linear-gradient(145deg, #0f2b5c, #1e3a8a 40%, #2563eb); color: white; padding: 18px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; box-shadow: 0 8px 20px rgba(30,58,138,0.2); }
        .header h2 { font-size: 22px; font-weight: 800; }
        .nav-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 7px 14px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .lang-btn { background: white; color: #1e3a8a; border: none; padding: 7px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .filter-box { background: white; padding: 12px; border-radius: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .filter-box select { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .stat-card { background: white; padding: 14px; border-radius: 14px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid; }
        .stat-card .label { font-size: 11px; font-weight: 700; color: #64748b; }
        .stat-card .value { font-size: 20px; font-weight: 800; margin-top: 4px; }
        .sales { border-color: #2563eb; color: #1d4ed8; }
        .profit { border-color: #10b981; color: #047857; }
        .cash { border-color: #f59e0b; color: #b45309; }
        .credit { border-color: #8b5cf6; color: #6d28d9; }
        .expense { border-color: #ef4444; color: #b91c1c; }
        .cash-in-hand { border-color: #1e293b; background: #1e293b; color: white; grid-column: span 2; }
        .section { background: white; padding: 18px; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 6px 16px rgba(0,0,0,0.05); }
        .section-title { font-size: 16px; font-weight: 700; color: #1e3a8a; margin-bottom: 14px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .bill-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 8px; background: #f8fafc; }
        .btn-sm { border: none; padding: 6px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; color: white; }
        .btn-wa { background: #25d366; }
        .btn-cancel { background: #f97316; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-box { flex: 1; }
        .input-box label { font-size: 11px; font-weight: 700; color: #475569; display: block; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="pageTitle">📊 गल्ला रिपोर्ट</h2>
    <div style="display: flex; gap: 8px;">
        <button class="nav-btn" onclick="goBack()">⬅ <span id="backLabel">वापस</span></button>
        <button class="lang-btn" id="langToggleBtn" onclick="toggleLang()">English</button>
    </div>
</div>

<div class="filter-box">
    <span style="font-weight:700;font-size:14px;" id="filterLabel">अवधि:</span>
    <select id="dateFilter" onchange="calculateReport()"><option value="today">आज</option><option value="yesterday">कल</option><option value="week">7 दिन</option><option value="month">30 दिन</option><option value="all">सभी</option></select>
</div>

<div class="stats-grid">
    <div class="stat-card sales"><div class="label" id="salesLabel">कुल बिक्री</div><div class="value" id="tSales">₹0</div></div>
    <div class="stat-card profit"><div class="label" id="profitLabel">मुनाफ़ा</div><div class="value" id="tProfit">₹0</div></div>
    <div class="stat-card cash"><div class="label" id="cashLabel">नकद</div><div class="value" id="tCash">₹0</div></div>
    <div class="stat-card credit"><div class="label" id="creditLabel">उधार</div><div class="value" id="tUdhar">₹0</div></div>
    <div class="stat-card expense"><div class="label" id="expenseLabel">खर्चा</div><div class="value" id="tExpense">₹0</div></div>
    <div class="stat-card cash-in-hand"><div class="label">गल्ला (नकद-खर्चा)</div><div class="value" id="tNet" style="color:#10b981;">₹0</div></div>
</div>

<div class="section">
    <div class="section-title" id="expenseTitle">💸 खर्चा जोड़ें</div>
    <div class="input-row">
        <div class="input-box" style="flex:2;"><label id="expReasonLabel">विवरण</label><input type="text" id="expReason"></div>
        <div class="input-box"><label id="expAmtLabel">राशि (₹)</label><input type="number" id="expAmount"></div>
    </div>
    <button class="btn-primary" onclick="saveExpense()" id="saveExpenseBtn">खर्चा सेव करें</button>
</div>

<div class="section">
    <div class="section-title" id="historyTitle">📜 बिल हिस्ट्री</div>
    <div id="billList"></div>
</div>

<script>
    const SUPABASE_URL = "https://awfnnbohknhwlmbcebmg.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3Zm5uYm9oa25od2xtYmNlYm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODU2NzcsImV4cCI6MjA5NTU2MTY3N30.NC0nHC7vEvMloyEXDODJvWnpVAVTzcxEAc05tx_K6pg";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentSession = null, currentLang = localStorage.getItem("app_language") || "hi", allBills = [];

    const dict = {
        hi: { pageTitle:"📊 गल्ला रिपोर्ट", backLabel:"वापस", langToggle:"English", filterLabel:"अवधि:", salesLabel:"कुल बिक्री", profitLabel:"मुनाफ़ा", cashLabel:"नकद", creditLabel:"उधार", expenseLabel:"खर्चा", expenseTitle:"💸 खर्चा जोड़ें", expReasonLabel:"विवरण", expAmtLabel:"राशि (₹)", saveExpenseBtn:"खर्चा सेव करें", historyTitle:"📜 बिल हिस्ट्री", waBtn:"📲 WhatsApp" },
        en: { pageTitle:"📊 Cash Report", backLabel:"Back", langToggle:"हिंदी", filterLabel:"Period:", salesLabel:"Total Sales", profitLabel:"Profit", cashLabel:"Cash", creditLabel:"Credit", expenseLabel:"Expense", expenseTitle:"💸 Add Expense", expReasonLabel:"Description", expAmtLabel:"Amount (₹)", saveExpenseBtn:"Save Expense", historyTitle:"📜 Bill History", waBtn:"📲 WhatsApp" }
    };
    function applyLang() { const t=dict[currentLang]; for(let id in t){ let el=document.getElementById(id); if(el&&typeof t[id]==='string') el.innerText=t[id]; } calculateReport(); }
    function toggleLang() { currentLang=currentLang==="hi"?"en":"hi"; localStorage.setItem("app_language",currentLang); applyLang(); }

    async function fetchBills() {
        const {data}=await sb.from("transactions").select("*").eq("shop_code",currentSession.shop_code).order("date",{ascending:false});
        allBills=data||[]; calculateReport();
    }

    function calculateReport() {
        const filter=document.getElementById("dateFilter").value;
        const now=new Date(); let cutoff=new Date(0);
        if(filter==="today") cutoff=new Date(now.getFullYear(),now.getMonth(),now.getDate());
        else if(filter==="yesterday"){ cutoff=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1); }
        else if(filter==="week") cutoff=new Date(now.getTime()-7*86400000);
        else if(filter==="month") cutoff=new Date(now.getTime()-30*86400000);

        let sales=0, cash=0, credit=0, expense=0;
        const list=document.getElementById("billList"); list.innerHTML="";
        allBills.forEach(b=>{
            const d=new Date(b.date); if(d<cutoff && filter!=="all") return;
            const amt=Number(b.amount||0);
            if(b.type==="sale"){ sales+=amt; if(b.payment_mode==="Udhar") credit+=amt; else cash+=amt; }
            if(b.type==="expense") expense+=amt;
            list.innerHTML+=`<div class="bill-item"><b>${b.customer_name||"ग्राहक"}</b> - ₹${amt} (${b.payment_mode||b.type})<br><small>${new Date(b.date).toLocaleDateString("hi-IN")} | ${b.items||""}</small></div>`;
        });
        document.getElementById("tSales").innerText="₹"+sales.toLocaleString("en-IN");
        document.getElementById("tProfit").innerText="₹"+Math.round(sales*0.15).toLocaleString("en-IN");
        document.getElementById("tCash").innerText="₹"+cash.toLocaleString("en-IN");
        document.getElementById("tUdhar").innerText="₹"+credit.toLocaleString("en-IN");
        document.getElementById("tExpense").innerText="₹"+expense.toLocaleString("en-IN");
        document.getElementById("tNet").innerText="₹"+(cash-expense).toLocaleString("en-IN");
    }

    async function saveExpense() {
        const reason=document.getElementById("expReason").value.trim(), amt=parseFloat(document.getElementById("expAmount").value)||0;
        if(!reason||!amt) return;
        await sb.from("transactions").insert([{ shop_code:currentSession.shop_code, type:"expense", amount:amt, description:reason, date:new Date().toISOString() }]);
        document.getElementById("expReason").value=""; document.getElementById("expAmount").value=""; fetchBills();
    }

    function goBack() { window.location.href="dashboard.html"; }

    window.onload=async()=>{
        const s=localStorage.getItem("merchant_session"); if(!s){ window.location.href="vyapar_login.html"; return; }
        currentSession=JSON.parse(s); applyLang(); fetchBills();
    };
</script>
</body>
</html>
